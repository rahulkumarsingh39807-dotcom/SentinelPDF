<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SentinelPDF{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loading.css') }}">

    {% block css %}{% endblock %}
</head>

<body>

<!-- Loading Screen -->
<div id="loading-screen" class="loading-screen d-none">
    <div class="text-center">
        <div class="spinner-border text-success"></div>
        <h4 class="mt-3">Analyzing PDF...</h4>
        <p>Please wait...</p>
    </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

    <div class="container-fluid">

        <button class="btn btn-dark d-lg-none" id="menu-toggle">
            <i class="fas fa-bars"></i>
        </button>

        <a class="navbar-brand fw-bold ms-2" href="/">
            <i class="fas fa-shield-virus text-success"></i>
            SentinelPDF
        </a>

        <div class="ms-auto">

            <button class="btn btn-outline-light rounded-circle">

                <i class="fas fa-user"></i>

            </button>

        </div>

    </div>

</nav>

<div class="wrapper">

    <!-- Sidebar -->

    <aside id="sidebar">

        <div class="logo">

            <h4>MENU</h4>

        </div>

        <ul>

            <li>
                <a href="/">
                    <i class="fas fa-chart-line"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-file-upload"></i>
                    Upload PDF
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-file-alt"></i>
                    Reports
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-history"></i>
                    History
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-cog"></i>
                    Settings
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main id="content">

        {% block content %}

        {% endblock %}

    </main>

</div>

<footer>

    © 2026 SentinelPDF | PDF Malware Analysis Toolkit

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

{% block js %}{% endblock %}

</body>

</html>
